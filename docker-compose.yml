version: '3.8'

services:
  graphql-countries:
    build:
      context: .
      dockerfile: services/countries-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REST_COUNTRIES_URL: "https://restcountries.com/v3.1"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    container_name: graphql-countries-service
    restart: unless-stopped
    networks:
      - graphql-network

  graphql-demographics:
    build:
      context: .
      dockerfile: services/demographics-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      REST_COUNTRIES_URL: "https://restcountries.com/v3.1"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    container_name: graphql-demographics-service
    restart: unless-stopped
    networks:
      - graphql-network
    depends_on:
      - graphql-countries

networks:
  graphql-network:
    driver: bridge
