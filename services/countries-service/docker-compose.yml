services:
  graphql-countries:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REST_COUNTRIES_URL: "https://restcountries.com/v3.1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    container_name: graphql-countries-service
    restart: unless-stopped
