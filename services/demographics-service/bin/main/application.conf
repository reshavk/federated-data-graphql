ktor {
  application {
    modules = [ com.example.demographics.MainKt.module ]
  }
  deployment {
    port = 8081
  }
  logging {
    level = DEBUG
  }
}

graphql {
  endpoint = "/graphql"
  ide {
    enabled = true
    path = "/"
  }
}

services {
  rest-countries {
    baseUrl = "https://restcountries.com/v3.1"
    timeout = 10000
  }
}
